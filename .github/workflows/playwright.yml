name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Functional tests (ALL browsers)
    - name: Run functional tests
      run: npx playwright test --grep-invert "@visual"

    # Visual tests (Chromium ONLY)
    - name: Run visual tests (Chromium only)
      run: npx playwright test -g "@visual" --project=chromium
